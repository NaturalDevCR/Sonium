name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  test:
    name: Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache Cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Install system dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libopus-dev \
            libasound2-dev \
            libgtk-3-dev \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            libsoup-3.0-dev

      - name: Install system dependencies (macOS)
        if: runner.os == 'macOS'
        run: brew install opus

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Clippy (deny warnings)
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: Build workspace
        run: cargo build --workspace

      - name: Unit tests
        run: cargo test --workspace --lib --bins -- --test-threads=4

      - name: Integration tests
        run: cargo test --workspace --tests -- --test-threads=4

  # ── Lightweight compile-only check on Windows ───────────────────────────
  windows-check:
    name: Build check (Windows)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            target/
          key: windows-cargo-${{ hashFiles('**/Cargo.lock') }}
      - name: Build
        run: cargo build --workspace

  # ── Nightly fuzz (60-second smoke, catches regressions) ─────────────────
  fuzz:
    name: Fuzz smoke (Linux)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install nightly + cargo-fuzz
        uses: dtolnay/rust-toolchain@nightly

      - name: Cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            target/
          key: fuzz-cargo-${{ hashFiles('fuzz/Cargo.lock') }}

      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y libopus-dev

      - name: Install cargo-fuzz
        run: cargo install cargo-fuzz --locked

      - name: Fuzz message parser (60 s)
        run: cargo +nightly fuzz run fuzz_message_parser -- -max_total_time=60
        working-directory: ${{ github.workspace }}

      - name: Fuzz wire chunk (60 s)
        run: cargo +nightly fuzz run fuzz_wire_chunk -- -max_total_time=60
        working-directory: ${{ github.workspace }}

      - name: Fuzz codec header (60 s)
        run: cargo +nightly fuzz run fuzz_codec_header -- -max_total_time=60
        working-directory: ${{ github.workspace }}
