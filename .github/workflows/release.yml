name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to release, for example v0.1.0'
        required: true
        type: string

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  build-web:
    name: Build embedded web UI
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: web/pnpm-lock.yaml

      - name: Install web dependencies
        run: pnpm install --frozen-lockfile
        working-directory: web

      - name: Build web UI
        run: pnpm build
        working-directory: web

      - name: Upload embedded web UI
        uses: actions/upload-artifact@v4
        with:
          name: web-dist
          path: web/dist/

  build-rust:
    name: Build ${{ matrix.package }}
    needs: build-web
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            package: linux-x86_64
            archive: tar.gz
          - os: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu
            package: linux-aarch64
            archive: tar.gz
          - os: macos-14
            target: aarch64-apple-darwin
            package: macos-aarch64
            archive: tar.gz
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            package: windows-x86_64
            archive: zip

    steps:
      - uses: actions/checkout@v4

      - name: Download embedded web UI
        uses: actions/download-artifact@v4
        with:
          name: web-dist
          path: web/dist/

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y pkg-config libopus-dev libasound2-dev

      - name: Install macOS dependencies
        if: runner.os == 'macOS'
        run: brew install opus

      - name: Build release binaries
        run: cargo build --release --target ${{ matrix.target }} --bin sonium-server --bin sonium-client

      - name: Stage package
        shell: bash
        run: |
          set -euxo pipefail
          version="${GITHUB_REF_NAME}"
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            version="${{ inputs.tag }}"
          fi

          suffix=""
          if [[ "${{ runner.os }}" == "Windows" ]]; then
            suffix=".exe"
          fi

          package_dir="sonium-${version}-${{ matrix.package }}"
          mkdir -p "${package_dir}"
          cp "target/${{ matrix.target }}/release/sonium-server${suffix}" "${package_dir}/"
          cp "target/${{ matrix.target }}/release/sonium-client${suffix}" "${package_dir}/"
          cp README.md "${package_dir}/"
          cp LICENSE "${package_dir}/" 2>/dev/null || true
          cp install.sh "${package_dir}/" || true

          if [[ "${{ matrix.archive }}" == "zip" ]]; then
            7z a "${package_dir}.zip" "${package_dir}"
            mkdir -p dist
            mv "${package_dir}.zip" dist/
          else
            tar -czf "${package_dir}.tar.gz" "${package_dir}"
            mkdir -p dist
            mv "${package_dir}.tar.gz" dist/
          fi

      - name: Upload release package
        uses: actions/upload-artifact@v4
        with:
          name: sonium-${{ matrix.package }}
          path: dist/*

  build-gui:
    name: Build Desktop Agent (${{ matrix.os }})
    needs: publish
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-14
            target: aarch64-apple-darwin
          - os: windows-latest
            target: x86_64-pc-windows-msvc

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install macOS dependencies
        if: runner.os == 'macOS'
        run: brew install opus

      - name: Install web dependencies
        run: npm install
        working-directory: client-gui

      - name: Build Tauri Desktop Agent
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          projectPath: client-gui
          args: --target ${{ matrix.target }}
          tagName: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
          releaseId: ${{ needs.publish.outputs.release_id }}

  publish:
    name: Publish GitHub Release
    needs: build-rust
    runs-on: ubuntu-latest
    outputs:
      release_id: ${{ steps.create_release.outputs.id }}
    steps:
      - uses: actions/checkout@v4

      - name: Download release packages
        uses: actions/download-artifact@v4
        with:
          pattern: sonium-*
          path: release-assets
          merge-multiple: true

      - name: Add installer
        run: cp install.sh release-assets/install.sh

      - name: Publish release
        id: create_release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
          files: release-assets/*
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
