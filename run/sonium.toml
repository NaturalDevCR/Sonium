[server]
bind = "127.0.0.1"
stream_port = 1710
control_port = 1711
mdns = false
snapcast_compat = false

[server.audio]
buffer_ms = 200
chunk_ms = 10
output_prefill_ms = 0

[server.auto_buffer]
enabled = false
min_ms = 20
max_ms = 3000
step_up_ms = 120
step_down_ms = 40
cooldown_ms = 8000

[server.transport]
mode = "tcp"
udp_port = 0

[log]
level = "info"

[[streams]]
id = "default"
source = "pipe:///usr/bin/ffmpeg?-reconnect&1&-reconnect_streamed&1&-i&https://cast.symphonycr.com/listen/party_time/radio.mp3&-f&s16le&-ar&48000&-ac&2&-"
codec = "opus"
idle_timeout_ms = 3000
silence_on_idle = true
