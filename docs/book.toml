[book]
title       = "Sonium"
description = "Open-source multiroom audio — documentation"
authors     = ["Sonium Contributors"]
language    = "en"
src         = "src"

[output.html]
site-url            = "/sonium/"
git-repository-url  = "https://github.com/jdavidoa91/sonium"
git-repository-icon = "fa-github"
edit-url-template   = "https://github.com/jdavidoa91/sonium/edit/main/docs/src/{path}"
theme               = "coal"
preferred-dark-theme = "coal"
no-section-label    = false
fold.enable         = true
fold.level          = 1

[output.html.search]
enable      = true
limit-results = 20
teaser-word-count = 30

[preprocessor.links]
